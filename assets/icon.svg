<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background: warm near-black gradient square with rounded corners -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0508"/>
      <stop offset="55%" stop-color="#15090F"/>
      <stop offset="100%" stop-color="#1F0E1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#glow)"/>

  <!-- Core -->
  <ellipse cx="256" cy="256" rx="72" ry="48" fill="#A78BFA" opacity="0.95"/>
  <ellipse cx="256" cy="256" rx="48" ry="32" fill="#7C3AED"/>

  <!-- Ring 1 (brightest) -->
  <path d="M256 152c-72 0-134 28-158 68" stroke="#A78BFA" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
  <path d="M414 236c-24-40-86-68-158-68" stroke="#A78BFA" stroke-width="14" stroke-linecap="round" opacity="0.75"/>
  <path d="M256 360c72 0 134-28 158-68" stroke="#A78BFA" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
  <path d="M98 276c24 40 86 68 158 68" stroke="#A78BFA" stroke-width="14" stroke-linecap="round" opacity="0.75"/>

  <!-- Ring 2 -->
  <path d="M256 108c-96 0-178 38-210 92" stroke="#8B5CF6" stroke-width="12" stroke-linecap="round" opacity="0.75"/>
  <path d="M466 200c-32-54-114-92-210-92" stroke="#8B5CF6" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
  <path d="M256 404c96 0 178-38 210-92" stroke="#8B5CF6" stroke-width="12" stroke-linecap="round" opacity="0.75"/>
  <path d="M46 312c32 54 114 92 210 92" stroke="#8B5CF6" stroke-width="12" stroke-linecap="round" opacity="0.55"/>

  <!-- Ring 3 (outermost, faintest) -->
  <path d="M256 72c-118 0-220 48-260 116" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M516 188c-40-68-142-116-260-116" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <path d="M256 440c118 0 220-48 260-116" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M-4 324c40 68 142 116 260 116" stroke="#7C3AED" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
</svg>
